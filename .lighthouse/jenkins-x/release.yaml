apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: release
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          image: uses:mikelear/leartech-pipeline-catalog/tasks/go/release.yaml@main
          name: ""
          resources: {}
          workingDir: /workspace/source
        steps:
        - name: ""
          resources: {}
    # leartech-gate is a CLI binary invoked from a Tekton task in promotion-PR
    # presubmits. It has no public HTTP API — the cmd/server stub from the
    # golden template is kept for chart deployability but doesn't expose
    # routes worth generating clients for.
    #
    # Therefore: no openapi-generation task. The golden template's
    # release.yaml runs codegen unconditionally; for CLI services we skip
    # it. Captured as bootstrap gap #5 in session-0-lessons.md.
    #
    # Phase 1 hardening (proposed): make the openapi-generation task
    # opt-in via a flag in the consumer repo's release.yaml, so CLI services
    # don't have to remove it (cleaner inheritance from the catalog task).
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 12h0m0s
status: {}
